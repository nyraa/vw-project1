<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>

      <!---->

      <a-assets>
        <a-asset-item id="horse" src="models/horse.glb"></a-asset-item>
        <a-asset-item id="terrain" src="models/terrain.glb"></a-asset-item>
      </a-assets>
      <!--馬-->
      <a-entity gltf-model="#horse" position="0 1 -3" rotation="0 180 0" scale="0.01 0.01 0.01"></a-entity>
      <!--山-->
      <a-entity gltf-model="#terrain" position="-200 17.6 0" rotation="0 90 0" scale="0.1 0.4 0.1"></a-entity>
      <!--地板-->
      <a-plane position="0 0 -4" rotation="-90 0 0" width="150" height="150" color="#7BC8A4"></a-plane>
      <!--天空-->
      <a-sky color="#000000"></a-sky>

      <!--原本預設的東西 可當範例複製 要刪可刪
      <a-box position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box>
      <a-sphere position="0 1.25 -5" radius="1.25" color="#EF2D5E"></a-sphere>
      <a-cylinder position="1 0.75 -3" radius="1" height="1.5" color="#FFC65D"></a-cylinder>
      -->
    </a-scene>
  </body>
</html>
